# ============================
# Configuration ShopFlow
# ============================

# Profil actif: dev (MySQL) ou prod (PostgreSQL)
spring.profiles.active=dev

# ============================
# Base de données MySQL
# ============================
spring.datasource.url=jdbc:mysql://localhost:3306/shopflow?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# ============================
# JPA / Hibernate
# ============================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================
# JWT
# ============================
app.jwt.secret=shopflow-secret-key-very-long-and-secure-minimum-256-bits-for-hmac-sha256
app.jwt.access-token-expiration=86400000
app.jwt.refresh-token-expiration=604800000

# ============================
# Swagger / OpenAPI
# ============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui

# ============================
# Serveur
# ============================
server.port=8080
